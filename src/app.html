<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f1f2f4" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0d0e" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon.ico" sizes="32x32" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<script>
			(function () {
				var s = localStorage.getItem('theme');
				var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
				if (s === 'dark' || (s !== 'light' && d)) document.documentElement.classList.add('dark');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<noscript>
			<style>
				.noscript-note {
					box-sizing: border-box;
					min-height: 100dvh;
					display: grid;
					place-items: center;
					padding: 24px;
					background: #f1f2f4;
					color: #0b0c0e;
					font-family:
						system-ui,
						-apple-system,
						sans-serif;
					font-size: 15px;
					line-height: 1.6;
					text-align: center;
				}
				.noscript-note p {
					max-width: 34rem;
					margin: 0;
				}
				@media (prefers-color-scheme: dark) {
					.noscript-note {
						background: #0c0d0e;
						color: #f1f2f4;
					}
				}
			</style>
			<div class="noscript-note">
				<p>
					<strong>Compress Pro needs JavaScript.</strong><br />
					The whole app runs in your browser — files are compressed on your device and never
					uploaded, so there is no server that could do the work instead. Enable JavaScript and
					reload the page.
				</p>
			</div>
		</noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
